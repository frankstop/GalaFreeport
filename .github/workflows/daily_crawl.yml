name: Daily Gala Freeport-Merrick Catalog

on:
  schedule:
    # Run after the top-of-hour GitHub Actions load spike and before 5:30 AM.
    # The named timezone keeps the schedule at 5:17 AM through EST/EDT changes.
    - cron: "17 5 * * *"
      timezone: "America/New_York"
  workflow_dispatch:
    inputs:
      mode:
        description: "Verify checked-in data or perform a live collection"
        required: true
        default: verify
        type: choice
        options:
          - verify
          - collect

concurrency:
  group: daily-gala-freeport-catalog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-analyze-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: python -m pip install -e .

      - name: Install supported Playwright Chromium
        if: github.event_name == 'schedule' || inputs.mode == 'collect'
        # GitHub's Ubuntu runner image already carries Chromium's system
        # libraries; install only Playwright's pinned browser binary.
        run: python -m playwright install chromium

      - name: Collect complete public catalog
        if: github.event_name == 'schedule' || inputs.mode == 'collect'
        shell: bash
        run: |
          mkdir -p work
          rm -f work/workflow_failure.txt
          python -m gala_freeport run --verbose || {
            code=$?
            echo "Live collection failed closed with exit code $code; no output was committed. See the collection step log." > work/workflow_failure.txt
            exit "$code"
          }

      - name: Run offline tests and static checks
        if: always()
        run: |
          python -m unittest discover -v
          python scripts/check.py

      - name: Write workflow summary
        if: always()
        run: python scripts/workflow_summary.py >> "$GITHUB_STEP_SUMMARY"

      - name: Commit healthy raw and derived outputs together
        if: success() && (github.event_name == 'schedule' || inputs.mode == 'collect')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots docs
          if git diff --staged --quiet; then
            echo "No healthy snapshot or derived report changes."
          else
            git commit -m "data: daily Gala Freeport-Merrick catalog $(date -u +%F)"
            git push
          fi
